<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveDance 歌词</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="lyrics-clone">
    <div class="app lyrics-only">
      <div class="lyrics-toolbar" data-no-drag>
        <button
          type="button"
          id="mousePassthroughLockBtn"
          title="开启后本窗口鼠标穿透到下层"
          aria-pressed="false"
          aria-label="穿透锁定"
        >
          <img
            class="toolbar-icon"
            data-lock-icon
            src="/icons/passthrough-idle.svg"
            alt=""
            width="14"
            height="14"
            decoding="async"
          />
        </button>
        <button type="button" id="openSettingsBtn" title="设置" aria-label="设置">
          <img
            class="toolbar-icon"
            src="/icons/settings.svg"
            alt=""
            width="14"
            height="14"
            decoding="async"
          />
        </button>
      </div>
      <div id="nowPlayingLyrics" class="now-playing-lyrics lyrics-window-body" data-no-drag hidden>
        <div class="now-playing-lyrics-current-stage">
          <div class="now-playing-lyrics-line is-current" data-lyric-slot="a"><span class="now-playing-lyrics-vtext"></span></div>
          <div class="now-playing-lyrics-line is-current" data-lyric-slot="b" hidden aria-hidden="true"><span class="now-playing-lyrics-vtext"></span></div>
        </div>
        <div id="nowPlayingLyricNext" class="now-playing-lyrics-line is-next"><span class="now-playing-lyrics-vtext"></span></div>
      </div>
    </div>
    <script type="module" src="/src/lyricsWindow.js"></script>
  </body>
</html>
