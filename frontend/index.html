<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveDance</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="resize-handle edge top" data-resize-dir="north"></div>
    <div class="resize-handle edge right" data-resize-dir="east"></div>
    <div class="resize-handle edge bottom" data-resize-dir="south"></div>
    <div class="resize-handle edge left" data-resize-dir="west"></div>
    <div class="resize-handle corner top-left" data-resize-dir="northwest"></div>
    <div class="resize-handle corner top-right" data-resize-dir="northeast"></div>
    <div class="resize-handle corner bottom-right" data-resize-dir="southeast"></div>
    <div class="resize-handle corner bottom-left" data-resize-dir="southwest"></div>
    <div class="app main-only">
      <div class="main-toolbar" data-no-drag>
        <button
          type="button"
          id="mousePassthroughLockBtn"
          title="开启后主窗口鼠标穿透到下层；按钮会移到右上角浮动条，也可用 ⌘⇧⌥L 切换。"
          aria-pressed="false"
          aria-label="穿透锁定"
        >
          <img
            class="toolbar-icon"
            data-lock-icon
            src="/icons/passthrough-idle.svg"
            alt=""
            width="14"
            height="14"
            decoding="async"
          />
        </button>
        <button
          type="button"
          id="newSpectrumWindowBtn"
          title="在当前窗口旁再开一个频谱窗口（共用同一路音频与设置）"
          aria-label="新建频谱窗口"
        >
          <span class="toolbar-plus" aria-hidden="true">+</span>
        </button>
        <button type="button" id="openSettingsBtn" title="设置" aria-label="设置">
          <img
            class="toolbar-icon"
            src="/icons/settings.svg"
            alt=""
            width="14"
            height="14"
            decoding="async"
          />
        </button>
      </div>
      <div id="nowPlayingLyrics" class="now-playing-lyrics" data-no-drag hidden></div>
      <div id="nowPlayingPanel" class="now-playing-panel is-idle" data-no-drag>
        <img id="nowPlayingArt" class="now-playing-art" alt="" width="48" height="48" decoding="async" />
        <div class="now-playing-meta">
          <div id="nowPlayingTitle" class="now-playing-title">未检测到正在播放</div>
          <div id="nowPlayingArtist" class="now-playing-artist"></div>
          <div id="nowPlayingAlbum" class="now-playing-album"></div>
          <div id="nowPlayingSource" class="now-playing-source"></div>
        </div>
      </div>
      <canvas id="waveCanvas"></canvas>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
