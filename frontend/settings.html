<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveDance 设置</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="settings-window">
    <div class="settings-app">
      <header class="settings-header">
        <div class="settings-header__brand">
          <span class="settings-header__mark" aria-hidden="true"></span>
          <div>
            <h1 class="settings-header__title">WaveDance</h1>
            <p class="settings-header__subtitle">系统音频 · 频谱显示</p>
            <p id="visualTargetBanner" class="settings-visual-target" hidden></p>
          </div>
        </div>
        <p id="status" class="settings-status" role="status">等待启动采集…</p>
      </header>

      <section class="settings-card" aria-labelledby="sec-blackhole">
        <h2 id="sec-blackhole" class="settings-card__title">系统音频（BlackHole）</h2>
        <div class="settings-card__body">
          <div class="settings-field settings-field--row" data-no-drag>
            <label for="captureSourceMode" class="settings-label">采集模式</label>
            <select id="captureSourceMode" class="settings-select">
              <option value="blackhole" selected>BlackHole（系统声音）</option>
              <option value="microphone">麦克风（默认输入）</option>
            </select>
          </div>
          <p id="blackholeHint" class="settings-blackhole-hint" role="status"></p>
          <div class="settings-actions settings-actions--wrap" data-no-drag>
            <button type="button" id="blackholeInstallBtn" class="settings-btn">
              安装 BlackHole…
            </button>
            <button type="button" id="blackholeRefreshBtn" class="settings-btn settings-btn--ghost">
              重新检测
            </button>
            <button
              type="button"
              id="openMidiSetupBtn"
              class="settings-btn settings-btn--ghost"
              hidden
            >
              打开音频 MIDI 设置
            </button>
            <button
              type="button"
              id="openSoundSettingsBtn"
              class="settings-btn settings-btn--ghost"
              hidden
            >
              打开音频设置
            </button>
          </div>
        </div>
      </section>

      <section class="settings-card" aria-labelledby="sec-transport">
        <h2 id="sec-transport" class="settings-card__title">采集与窗口</h2>
        <div class="settings-card__body">
          <div class="settings-actions" data-no-drag>
            <button type="button" id="startBtn" class="settings-btn settings-btn--primary">开始采集</button>
            <button type="button" id="stopBtn" class="settings-btn">停止采集</button>
            <label class="settings-toggle">
              <input id="pinToggle" type="checkbox" checked />
              <span class="settings-toggle__ui" aria-hidden="true"></span>
              <span>置顶模式</span>
            </label>
          </div>
        </div>
      </section>

      <section class="settings-card" aria-labelledby="sec-spectrum">
        <h2 id="sec-spectrum" class="settings-card__title">频谱分析</h2>
        <div class="settings-card__body settings-form" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="displayMode" class="settings-label">展示模式</label>
            <select id="displayMode" class="settings-select">
              <option value="line" selected>线状图</option>
              <option value="bar">柱状图</option>
              <option value="area">填充波形</option>
              <option value="gradientBar">渐变频谱柱</option>
              <option value="glowLine">霓虹发光线</option>
            </select>
          </div>
          <div class="settings-field settings-field--row">
            <label for="panelStyleMode" class="settings-label">面板风格</label>
            <select id="panelStyleMode" class="settings-select">
              <option value="pro" selected>专业风格</option>
              <option value="minimal">简约风格</option>
            </select>
          </div>
          <div class="settings-field">
            <label for="bucketRange" class="settings-label">分桶数量 <span class="settings-value" id="bucketValue">256</span></label>
            <input id="bucketRange" type="range" min="8" max="500" step="1" value="256" />
          </div>
          <div class="settings-field settings-field--row">
            <label for="bucketMode" class="settings-label">分桶模式</label>
            <select id="bucketMode" class="settings-select">
              <option value="log">对数（低频更细）</option>
              <option value="linear" selected>线性（频段等宽）</option>
            </select>
          </div>
          <div class="settings-field">
            <label for="tiltRange" class="settings-label">高频补偿 <span class="settings-value" id="tiltValue">35</span>%</label>
            <input id="tiltRange" type="range" min="0" max="200" step="1" value="35" />
          </div>
          <div class="settings-field">
            <label for="freqMinRange" class="settings-label">频率下限 <span class="settings-value" id="freqMinValue">480</span> Hz</label>
            <input id="freqMinRange" type="range" min="20" max="20000" step="10" value="480" />
          </div>
          <div class="settings-field">
            <label for="freqMaxRange" class="settings-label">频率上限 <span class="settings-value" id="freqMaxValue">7600</span> Hz</label>
            <input id="freqMaxRange" type="range" min="100" max="24000" step="10" value="7600" />
          </div>
          <label class="settings-toggle settings-toggle--block">
            <input id="freqReversedToggle" type="checkbox" />
            <span class="settings-toggle__ui" aria-hidden="true"></span>
            <span>反转频率方向（高音/低音对调）</span>
          </label>
        </div>
      </section>

      <section class="settings-card" id="lineConfigPanel" aria-labelledby="sec-line-display">
        <h2 id="sec-line-display" class="settings-card__title">线状图配置</h2>
        <div class="settings-card__body settings-form panel-content panel-content--line" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="waveformColor" class="settings-label">线条颜色</label>
            <input id="waveformColor" type="color" value="#c4a574" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="waveformWidthRange" class="settings-label">线条粗细 <span class="settings-value" id="waveformWidthValue">2</span> px</label>
            <input id="waveformWidthRange" type="range" min="1" max="12" step="1" value="2" />
          </div>
          <div class="settings-field">
            <label for="waveformGainRange" class="settings-label">增益 <span class="settings-value" id="waveformGainValue">50</span>%</label>
            <input id="waveformGainRange" type="range" min="10" max="150" step="1" value="50" />
          </div>
          <div class="settings-field">
            <label for="waveformSmoothRange" class="settings-label">平滑度 <span class="settings-value" id="waveformSmoothValue">28</span>%</label>
            <input id="waveformSmoothRange" type="range" min="0" max="400" step="1" value="28" />
          </div>
          <div class="settings-field">
            <label for="waveformSoftClipRange" class="settings-label">峰值柔化 <span class="settings-value" id="waveformSoftClipValue">22</span>%</label>
            <input id="waveformSoftClipRange" type="range" min="0" max="100" step="1" value="22" />
          </div>
          <div class="settings-field">
            <label for="waveformFallEaseRange" class="settings-label">下落缓动 <span class="settings-value" id="waveformFallEaseValue">68</span>%</label>
            <input id="waveformFallEaseRange" type="range" min="0" max="100" step="1" value="68" />
          </div>
        </div>
      </section>

      <section class="settings-card" id="areaConfigPanel" aria-labelledby="sec-area-display" hidden>
        <h2 id="sec-area-display" class="settings-card__title">填充波形配置</h2>
        <div class="settings-card__body settings-form panel-content panel-content--area" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="areaFillColor" class="settings-label">填充颜色</label>
            <input id="areaFillColor" type="color" value="#c4a574" class="settings-color" />
          </div>
          <div class="settings-field settings-field--row">
            <label for="areaLineColor" class="settings-label">线条颜色</label>
            <input id="areaLineColor" type="color" value="#c4a574" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="areaFillAlphaRange" class="settings-label">填充透明度 <span class="settings-value" id="areaFillAlphaValue">45</span>%</label>
            <input id="areaFillAlphaRange" type="range" min="0" max="100" step="1" value="45" />
          </div>
          <div class="settings-field">
            <label for="areaLineWidthRange" class="settings-label">线条粗细 <span class="settings-value" id="areaLineWidthValue">2</span> px</label>
            <input id="areaLineWidthRange" type="range" min="1" max="12" step="1" value="2" />
          </div>
          <label class="settings-toggle settings-toggle--block">
            <input id="areaMirrorToggle" type="checkbox" />
            <span class="settings-toggle__ui" aria-hidden="true"></span>
            <span>镜像对称（中心对称填充）</span>
          </label>
          <label class="settings-toggle settings-toggle--block">
            <input id="areaGradientToggle" type="checkbox" checked />
            <span class="settings-toggle__ui" aria-hidden="true"></span>
            <span>纵向渐变（基线→峰值）</span>
          </label>
          <div class="settings-field">
            <label for="areaGainRange" class="settings-label">增益 <span class="settings-value" id="areaGainValue">50</span>%</label>
            <input id="areaGainRange" type="range" min="10" max="150" step="1" value="50" />
          </div>
          <div class="settings-field">
            <label for="areaSmoothRange" class="settings-label">平滑度 <span class="settings-value" id="areaSmoothValue">28</span>%</label>
            <input id="areaSmoothRange" type="range" min="0" max="400" step="1" value="28" />
          </div>
          <div class="settings-field">
            <label for="areaSoftClipRange" class="settings-label">峰值柔化 <span class="settings-value" id="areaSoftClipValue">22</span>%</label>
            <input id="areaSoftClipRange" type="range" min="0" max="100" step="1" value="22" />
          </div>
          <div class="settings-field">
            <label for="areaFallEaseRange" class="settings-label">下落缓动 <span class="settings-value" id="areaFallEaseValue">68</span>%</label>
            <input id="areaFallEaseRange" type="range" min="0" max="100" step="1" value="68" />
          </div>
        </div>
      </section>

      <section class="settings-card" id="barConfigPanel" aria-labelledby="sec-bar-display" hidden>
        <h2 id="sec-bar-display" class="settings-card__title">柱状图配置</h2>
        <div class="settings-card__body settings-form panel-content panel-content--bar" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="barColor" class="settings-label">柱体颜色</label>
            <input id="barColor" type="color" value="#8f7cff" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="barWidthRange" class="settings-label">柱体宽度 <span class="settings-value" id="barWidthValue">76</span>%</label>
            <input id="barWidthRange" type="range" min="20" max="100" step="1" value="76" />
          </div>
          <div class="settings-field">
            <label for="barGapRange" class="settings-label">柱间距 <span class="settings-value" id="barGapValue">18</span>%</label>
            <input id="barGapRange" type="range" min="0" max="70" step="1" value="18" />
          </div>
          <div class="settings-field">
            <label for="barHeadroomRange" class="settings-label">顶部留白 <span class="settings-value" id="barHeadroomValue">6</span>%</label>
            <input id="barHeadroomRange" type="range" min="0" max="40" step="1" value="6" />
          </div>
          <div class="settings-field settings-field--row">
            <label for="barOrientation" class="settings-label">排列方向</label>
            <select id="barOrientation" class="settings-select">
              <option value="horizontal" selected>左右排列</option>
              <option value="vertical">上下排列</option>
            </select>
          </div>
          <label class="settings-toggle settings-toggle--block">
            <input id="barMirrorToggle" type="checkbox" />
            <span class="settings-toggle__ui" aria-hidden="true"></span>
            <span>镜像柱体（中心对称）</span>
          </label>
          <div class="settings-field settings-field--row">
            <label for="barPeakHoldMode" class="settings-label">峰值保持线</label>
            <select id="barPeakHoldMode" class="settings-select">
              <option value="off">全部关闭</option>
              <option value="single" selected>仅一面</option>
              <option value="both">两面开启</option>
            </select>
          </div>
          <div class="settings-field settings-field--row">
            <label for="barPeakColor" class="settings-label">峰值线颜色</label>
            <input id="barPeakColor" type="color" value="#ffffff" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="barPeakFallSpeedRange" class="settings-label">峰值线回落速度 <span class="settings-value" id="barPeakFallSpeedValue">35</span></label>
            <input id="barPeakFallSpeedRange" type="range" min="5" max="120" step="1" value="35" />
          </div>
          <div class="settings-field">
            <label for="barPeakThicknessRange" class="settings-label">峰值线粗细 <span class="settings-value" id="barPeakThicknessValue">2</span> px</label>
            <input id="barPeakThicknessRange" type="range" min="1" max="8" step="1" value="2" />
          </div>
          <div class="settings-field">
            <label for="barGainRange" class="settings-label">增益 <span class="settings-value" id="barGainValue">62</span>%</label>
            <input id="barGainRange" type="range" min="10" max="150" step="1" value="62" />
          </div>
          <div class="settings-field">
            <label for="barSmoothRange" class="settings-label">平滑度 <span class="settings-value" id="barSmoothValue">18</span>%</label>
            <input id="barSmoothRange" type="range" min="0" max="400" step="1" value="18" />
          </div>
          <div class="settings-field">
            <label for="barSoftClipRange" class="settings-label">峰值柔化 <span class="settings-value" id="barSoftClipValue">12</span>%</label>
            <input id="barSoftClipRange" type="range" min="0" max="100" step="1" value="12" />
          </div>
          <div class="settings-field">
            <label for="barFallEaseRange" class="settings-label">下落缓动 <span class="settings-value" id="barFallEaseValue">52</span>%</label>
            <input id="barFallEaseRange" type="range" min="0" max="100" step="1" value="52" />
          </div>
        </div>
      </section>

      <section class="settings-card" id="gradientBarConfigPanel" aria-labelledby="sec-gradient-bar-display" hidden>
        <h2 id="sec-gradient-bar-display" class="settings-card__title">渐变频谱柱配置</h2>
        <div class="settings-card__body settings-form panel-content panel-content--gradient-bar" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="gradientBarColorLow" class="settings-label">低频颜色</label>
            <input id="gradientBarColorLow" type="color" value="#3b82f6" class="settings-color" />
          </div>
          <div class="settings-field settings-field--row">
            <label for="gradientBarColorHigh" class="settings-label">高频颜色</label>
            <input id="gradientBarColorHigh" type="color" value="#ec4899" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="gradientBarWidthRange" class="settings-label">柱体宽度 <span class="settings-value" id="gradientBarWidthValue">76</span>%</label>
            <input id="gradientBarWidthRange" type="range" min="20" max="100" step="1" value="76" />
          </div>
          <div class="settings-field">
            <label for="gradientBarGapRange" class="settings-label">柱间距 <span class="settings-value" id="gradientBarGapValue">18</span>%</label>
            <input id="gradientBarGapRange" type="range" min="0" max="70" step="1" value="18" />
          </div>
          <div class="settings-field">
            <label for="gradientBarHeadroomRange" class="settings-label">顶部留白 <span class="settings-value" id="gradientBarHeadroomValue">6</span>%</label>
            <input id="gradientBarHeadroomRange" type="range" min="0" max="40" step="1" value="6" />
          </div>
          <div class="settings-field settings-field--row">
            <label for="gradientBarOrientation" class="settings-label">排列方向</label>
            <select id="gradientBarOrientation" class="settings-select">
              <option value="horizontal" selected>左右排列</option>
              <option value="vertical">上下排列</option>
            </select>
          </div>
          <label class="settings-toggle settings-toggle--block">
            <input id="gradientBarMirrorToggle" type="checkbox" />
            <span class="settings-toggle__ui" aria-hidden="true"></span>
            <span>镜像柱体（中心对称）</span>
          </label>
          <div class="settings-field settings-field--row">
            <label for="gradientBarPeakHoldMode" class="settings-label">峰值保持线</label>
            <select id="gradientBarPeakHoldMode" class="settings-select">
              <option value="off">全部关闭</option>
              <option value="single" selected>仅一面</option>
              <option value="both">两面开启</option>
            </select>
          </div>
          <div class="settings-field settings-field--row">
            <label for="gradientBarPeakColor" class="settings-label">峰值线颜色</label>
            <input id="gradientBarPeakColor" type="color" value="#ffffff" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="gradientBarPeakFallSpeedRange" class="settings-label">峰值线回落速度 <span class="settings-value" id="gradientBarPeakFallSpeedValue">35</span></label>
            <input id="gradientBarPeakFallSpeedRange" type="range" min="5" max="120" step="1" value="35" />
          </div>
          <div class="settings-field">
            <label for="gradientBarPeakThicknessRange" class="settings-label">峰值线粗细 <span class="settings-value" id="gradientBarPeakThicknessValue">2</span> px</label>
            <input id="gradientBarPeakThicknessRange" type="range" min="1" max="8" step="1" value="2" />
          </div>
          <div class="settings-field">
            <label for="gradientBarGainRange" class="settings-label">增益 <span class="settings-value" id="gradientBarGainValue">62</span>%</label>
            <input id="gradientBarGainRange" type="range" min="10" max="150" step="1" value="62" />
          </div>
          <div class="settings-field">
            <label for="gradientBarSmoothRange" class="settings-label">平滑度 <span class="settings-value" id="gradientBarSmoothValue">18</span>%</label>
            <input id="gradientBarSmoothRange" type="range" min="0" max="400" step="1" value="18" />
          </div>
          <div class="settings-field">
            <label for="gradientBarSoftClipRange" class="settings-label">峰值柔化 <span class="settings-value" id="gradientBarSoftClipValue">12</span>%</label>
            <input id="gradientBarSoftClipRange" type="range" min="0" max="100" step="1" value="12" />
          </div>
          <div class="settings-field">
            <label for="gradientBarFallEaseRange" class="settings-label">下落缓动 <span class="settings-value" id="gradientBarFallEaseValue">52</span>%</label>
            <input id="gradientBarFallEaseRange" type="range" min="0" max="100" step="1" value="52" />
          </div>
        </div>
      </section>

      <section class="settings-card" id="glowLineConfigPanel" aria-labelledby="sec-glow-line-display" hidden>
        <h2 id="sec-glow-line-display" class="settings-card__title">霓虹发光线配置</h2>
        <div class="settings-card__body settings-form panel-content panel-content--glow-line" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="glowLineCoreColor" class="settings-label">核心线颜色</label>
            <input id="glowLineCoreColor" type="color" value="#c4a574" class="settings-color" />
          </div>
          <div class="settings-field settings-field--row">
            <label for="glowLineGlowColor" class="settings-label">光晕颜色</label>
            <input id="glowLineGlowColor" type="color" value="#c4a574" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="glowLineWidthRange" class="settings-label">线条粗细 <span class="settings-value" id="glowLineWidthValue">2</span> px</label>
            <input id="glowLineWidthRange" type="range" min="1" max="12" step="1" value="2" />
          </div>
          <div class="settings-field">
            <label for="glowLineGlowRadiusRange" class="settings-label">光晕半径 <span class="settings-value" id="glowLineGlowRadiusValue">8</span> px</label>
            <input id="glowLineGlowRadiusRange" type="range" min="2" max="24" step="1" value="8" />
          </div>
          <div class="settings-field">
            <label for="glowLineGlowIntensityRange" class="settings-label">光晕强度 <span class="settings-value" id="glowLineGlowIntensityValue">70</span>%</label>
            <input id="glowLineGlowIntensityRange" type="range" min="0" max="100" step="1" value="70" />
          </div>
          <div class="settings-field">
            <label for="glowLineGainRange" class="settings-label">增益 <span class="settings-value" id="glowLineGainValue">50</span>%</label>
            <input id="glowLineGainRange" type="range" min="10" max="150" step="1" value="50" />
          </div>
          <div class="settings-field">
            <label for="glowLineSmoothRange" class="settings-label">平滑度 <span class="settings-value" id="glowLineSmoothValue">28</span>%</label>
            <input id="glowLineSmoothRange" type="range" min="0" max="400" step="1" value="28" />
          </div>
          <div class="settings-field">
            <label for="glowLineSoftClipRange" class="settings-label">峰值柔化 <span class="settings-value" id="glowLineSoftClipValue">22</span>%</label>
            <input id="glowLineSoftClipRange" type="range" min="0" max="100" step="1" value="22" />
          </div>
          <div class="settings-field">
            <label for="glowLineFallEaseRange" class="settings-label">下落缓动 <span class="settings-value" id="glowLineFallEaseValue">68</span>%</label>
            <input id="glowLineFallEaseRange" type="range" min="0" max="100" step="1" value="68" />
          </div>
        </div>
      </section>

      <section class="settings-card" aria-labelledby="sec-display">
        <h2 id="sec-display" class="settings-card__title">主窗口显示</h2>
        <div class="settings-card__body settings-form" data-no-drag>
          <div class="settings-field settings-field--row">
            <label for="bodyBgColor" class="settings-label">叠加背景色</label>
            <input id="bodyBgColor" type="color" value="#000000" class="settings-color" />
          </div>
          <div class="settings-field">
            <label for="bodyBgAlpha" class="settings-label">透明度 <span class="settings-value" id="bodyBgAlphaValue">35</span>%</label>
            <input id="bodyBgAlpha" type="range" min="0" max="100" step="1" value="35" />
          </div>
          <label class="settings-toggle settings-toggle--block">
            <input id="blurToggle" type="checkbox" />
            <span class="settings-toggle__ui" aria-hidden="true"></span>
            <span>窗口毛玻璃（系统效果）</span>
          </label>
        </div>
      </section>

      <section class="settings-card" aria-labelledby="sec-app">
        <h2 id="sec-app" class="settings-card__title">应用</h2>
        <div class="settings-card__body">
          <p class="settings-muted">
