<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WaveDance 封面</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body class="cover-clone">
    <div class="app cover-only">
      <div class="cover-toolbar" data-no-drag>
        <button type="button" id="openCoverSettingsBtn" title="设置" aria-label="设置">
          <img
            class="toolbar-icon"
            src="/icons/settings.svg"
            alt=""
            width="14"
            height="14"
            decoding="async"
          />
        </button>
      </div>
      <div id="coverWindowBody" class="cover-window-body">
        <div id="coverArtFrame" class="cover-art-frame">
          <img id="coverArt" class="cover-art" alt="" decoding="async" draggable="false" hidden />
          <div id="coverPlaceholder" class="cover-placeholder">未检测到正在播放</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/coverWindow.js"></script>
  </body>
</html>
