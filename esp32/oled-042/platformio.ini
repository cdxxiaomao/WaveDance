; ESP32-C3 0.42" OLED — WaveDance WDFR v1 频谱（72×40 SSD1306，I2C SDA=5 SCL=6）
[env:esp32-c3-oled-042]
platform = espressif32 @ ^6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 921600
monitor_dtr = 0
monitor_rts = 0
upload_speed = 921600
board_build.flash_mode = dio
lib_deps =
    olikraus/U8g2 @ ^2.35.19
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_ESP32_C3_OLED_042
    -I../include
    -Iinclude
build_src_filter =
    +<*.cpp>
    -<wdfr_udp_receiver.cpp>
    -<.gitkeep>

; Phase 5：WiFi UDP 无线接收（需复制 ../include/wifi_config.example.h → ../include/wifi_config.h）
[env:esp32-c3-oled-042-wifi]
extends = env:esp32-c3-oled-042
lib_ldf_mode = deep+
build_flags =
    ${env:esp32-c3-oled-042.build_flags}
    -DWAVEDANCE_WIFI_UDP=1
    -include wifi_config.h
build_src_filter =
    +<*.cpp>
    -<.gitkeep>
