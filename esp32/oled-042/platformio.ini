; ESP32-C3 0.42" OLED — WaveDance WDFR v1 频谱（72×40 SSD1306，I2C SDA=5 SCL=6）
[env:esp32-c3-oled-042]
platform = espressif32 @ ^6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 921600
upload_speed = 921600
board_build.flash_mode = dio
lib_deps =
    olikraus/U8g2 @ ^2.35.19
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_ESP32_C3_OLED_042
    -I../include
    -Iinclude
build_src_filter =
    +<*.cpp>
    -<.gitkeep>
