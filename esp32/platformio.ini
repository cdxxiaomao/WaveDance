; WaveDance ESP32-C3-LCD-1.47 外接屏固件（Phase 3：多模式 + BOOT 切换）
; 硬件：https://github.com/waveshareteam/ESP32-C3-LCD-1.47

[platformio]
default_envs = esp32-c3-lcd-147

[env:esp32-c3-lcd-147]
platform = espressif32 @ ^6.9.0
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 921600
upload_speed = 921600
board_build.flash_mode = dio
lib_deps =
    moononournation/GFX Library for Arduino @ 1.5.9
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
    -Iinclude

[env:esp32-c3-lcd-147-debug]
extends = env:esp32-c3-lcd-147
build_flags =
    ${env:esp32-c3-lcd-147.build_flags}
    -DDEBUG_LOG=1

; Phase 5：WiFi UDP 无线接收（需复制 include/wifi_config.example.h → wifi_config.h）
[env:esp32-c3-lcd-147-wifi]
extends = env:esp32-c3-lcd-147
lib_ldf_mode = deep+
build_flags =
    ${env:esp32-c3-lcd-147.build_flags}
    -DWAVEDANCE_WIFI_UDP=1
    -include wifi_config.h
